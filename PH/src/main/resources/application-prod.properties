# Configuración PRODUCCIÓN v2 — NeonDB (PostgreSQL)

# NeonDB connection (variables de entorno en producción)
# Formato: jdbc:postgresql://[host].neon.tech/[database]?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging producción
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.cors=INFO
logging.level.org.springframework.web.filter=INFO
logging.level.root=INFO
