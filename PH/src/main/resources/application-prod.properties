# Configuración PRODUCCIÓN v2 — Supabase PostgreSQL

# Supabase connection (usar variables de entorno en producción)
spring.datasource.url=${SUPABASE_URL}
spring.datasource.username=${SUPABASE_USER}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging producción
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.cors=INFO
logging.level.org.springframework.web.filter=INFO
logging.level.root=INFO
