services:
  humberto-v2-backend:
    build:
      context: ./PH
      dockerfile: Dockerfile
    container_name: humberto-v2-backend
    restart: unless-stopped
    ports:
      - "8100:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
